<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Fruit Machine Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #2c3e50, #000);
            color: white;
        }

        /* Control Panel Styles */
        .controls {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            align-items: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #bdc3c7; }
        select, input { padding: 8px; border-radius: 5px; background: #34495e; color: white; border: none; }

        /* Main UI */
        h1 { font-size: 3rem; text-shadow: 0 0 20px #f1c40f; margin: 0 0 10px 0; }
        #status { font-size: 1.5rem; margin-bottom: 30px; color: #f1c40f; height: 1.6em; font-weight: bold; }

        #lever {
            padding: 40px 80px;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(#e74c3c, #c0392b);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px #962d22, 0 15px 20px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }

        #lever:active { box-shadow: 0 2px #962d22; transform: translateY(8px); }
        #lever:disabled { background: #7f8c8d; box-shadow: 0 5px #5d6d7e; cursor: not-allowed; opacity: 0.6; }

        .lights { display: flex; gap: 20px; margin-top: 40px; }
        .light { width: 40px; height: 40px; border-radius: 50%; background: #34495e; transition: background 0.1s; }
        .active-light { background: #f1c40f; box-shadow: 0 0 20px #f1c40f; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label>Sound Style</label>
            <select id="soundStyle">
                <option value="classic">Classic Arcade</option>
                <option value="tension">High Tension</option>
                <option value="scifi">Space Laser</option>
            </select>
        </div>
        <div class="control-group">
            <label>Spin Length: <span id="lengthVal">2</span>s</label>
            <input type="range" id="spinLength" min="1" max="5" step="0.5" value="2" oninput="document.getElementById('lengthVal').innerText=this.value">
        </div>
    </div>

    <h1>FRUIT MACHINE</h1>
    <div id="status">Ready?</div>
    
    <button id="lever" onclick="pullLever()">SPIN!</button>

    <div class="lights">
        <div id="L1" class="light"></div>
        <div id="L2" class="light"></div>
        <div id="L3" class="light"></div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, type, duration, startTime, volume = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, startTime);
            gain.gain.setValueAtTime(volume, startTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        async function pullLever() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const btn = document.getElementById('lever');
            const statusText = document.getElementById('status');
            const style = document.getElementById('soundStyle').value;
            const durationSec = parseFloat(document.getElementById('spinLength').value);
            const lights = [document.getElementById('L1'), document.getElementById('L2'), document.getElementById('L3')];

            btn.disabled = true;
            statusText.innerText = "SPINNING...";
            
            const startTime = audioCtx.currentTime;
            const steps = durationSec * 8; // Number of "beeps"
            const interval = (durationSec * 1000) / steps;

            // 1. Spinning Phase
            for(let i = 0; i < steps; i++) {
                const time = startTime + (i * (durationSec / steps));
                
                setTimeout(() => {
                    lights.forEach(l => l.classList.remove('active-light'));
                    lights[i % 3].classList.add('active-light');
                }, i * interval);

                // Sound logic based on selection
                if (style === 'classic') {
                    playTone(200 + (i * 40), 'square', 0.1, time);
                } else if (style === 'tension') {
                    playTone(150, 'sawtooth', interval/1000, time, 0.05);
                } else {
                    playTone(800 - (i * 20), 'sine', 0.1, time);
                }
            }

            // 2. The Ding Reveal
            setTimeout(() => {
                const now = audioCtx.currentTime;
                // Double Ding
                playTone(880, 'sine', 1, now, 0.2); 
                playTone(1108, 'sine', 1, now + 0.1, 0.1); 

                statusText.innerText = "FRUIT UP!!";
                lights.forEach(l => l.classList.add('active-light'));

                setTimeout(() => {
                    btn.disabled = false;
                    statusText.innerText = "Ready?";
                    lights.forEach(l => l.classList.remove('active-light'));
                }, 2500);
            }, durationSec * 1000);
        }
    </script>
</body>
</html>
